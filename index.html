<!DOCTYPE html>
<html>
<head>
    <title>Rotisería El Sabor</title>

    <style>
        body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #1a1a1a, #000000);
    color: white;
}img {
    border-radius: 10px;
    margin-bottom: 10px;
}
        }

        header {
            background-color: orange;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .producto {
            background-color: #222;
            margin: 15px auto;
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
        }

        button {
            background-color: orange;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: darkorange;
        }

        .whatsapp {
            margin-top: 30px;
        }
        .producto {
    transition: transform 0.2s;
}

.producto:hover {
    transform: scale(1.05);
}.producto {
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
    </style>
</head>

<body>

    <header>🔥 Rotisería El Sabor 🔥</header>

    <div class="container">
        <h2>Menú</h2>

        <div class="producto">
            <img src="https://images.unsplash.com/photo-1604908176997-4311d3a3c0f5" width="100%">
            <h3>Milanesas</h3>
            <p>$3000</p>
            <button onclick="comprar('Milanesas')">Comprar</button>
        </div>

        <div class="producto">
            <img src="https://images.unsplash.com/photo-1617196039897-3e3f3e9f1d3b" width="100%">
            <h3>Empanadas</h3>
            <p>$2000</p>
            <button onclick="comprar('Empanadas')">Comprar</button>
        </div>

        <div class="producto">
            <img src="https://images.unsplash.com/photo-1601924582975-7e5f1c5c8f3f" width="100%">
            <h3>Pizzas</h3>
            <p>$4000</p>
            <button onclick="comprar('Pizzas')">Comprar</button>
        </div>

        <div class="whatsapp">
            <a href="https://wa.me/542984123456?text=Hola%20quiero%20hacer%20un%20pedido" target="_blank">
                <button>📲 Pedir por WhatsApp</button>
            </a>
        </div>
    </div>

    <script>
        function comprar(producto) {
            alert("Elegiste: " + producto);
        }
    </script>

</body>
</html>
