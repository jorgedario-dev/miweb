<!DOCTYPE html>
<html>
<head>
    <title>Rotisería El Sabor</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #111;
            color: white;
        }

        header {
            background-color: orange;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .producto {
            background-color: #222;
            margin: 15px auto;
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
        }

        button {
            background-color: orange;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: darkorange;
        }

        .whatsapp {
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <header>🔥 Rotisería El Sabor 🔥</header>

    <div class="container">
        <h2>Menú</h2>

        <div class="producto">
            <h3>Milanesas</h3>
            <p>$3000</p>
            <button onclick="comprar('Milanesas')">Comprar</button>
        </div>

        <div class="producto">
            <h3>Empanadas</h3>
            <p>$2000</p>
            <button onclick="comprar('Empanadas')">Comprar</button>
        </div>

        <div class="producto">
            <h3>Pizzas</h3>
            <p>$4000</p>
            <button onclick="comprar('Pizzas')">Comprar</button>
        </div>

        <div class="whatsapp">
            <a href="https://wa.me/542984123456?text=Hola%20quiero%20hacer%20un%20pedido" target="_blank">
                <button>📲 Pedir por WhatsApp</button>
            </a>
        </div>
    </div>

    <script>
        function comprar(producto) {
            alert("Elegiste: " + producto);
        }
    </script>

</body>
</html>
